<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una Sorpresa Especial 💌</title>
</head>
<body>

<!-- iframe oculto para música -->
<iframe id="yt-frame" src="" allow="autoplay" allowfullscreen style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;"></iframe>

<!-- SOBRE -->
<div id="envelope-screen">
  <button onclick="openEnvelope()">Abrir sobre</button>
</div>

<!-- INVITACIÓN -->
<div id="invitation-screen" style="display:none;">
  <h1>Invitación</h1>
</div>

<script>
var envelopeOpened = false;

function openEnvelope(){
  if(envelopeOpened) return;
  envelopeOpened = true;

  // 🎬 animación (ejemplo)
  console.log("Sobre abierto");

  // 🎵 reproducir música desde YouTube
  const yt = document.getElementById("yt-frame");

  yt.src = "https://www.youtube.com/embed/SeCw5ewSnXk?autoplay=1&mute=0&controls=0&loop=1&playlist=SeCw5ewSnXk";

  // mostrar invitación después
  setTimeout(() => {
    document.getElementById("envelope-screen").style.display = "none";
    document.getElementById("invitation-screen").style.display = "block";
  }, 1800);
}
</script>

</body>
</html>
